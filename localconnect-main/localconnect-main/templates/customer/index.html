<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalConnect Dashboard</title>
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <main class="content-wrapper">
        <section class="category-container">
            <div class="category-grid">
                <div class="category-card">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="#2ecc71"><rect x="9" y="3" width="6" height="18" rx="1"></rect><rect x="3" y="9" width="18" height="6" rx="1"></rect></svg>
                    <p>Medical Shop</p>
                </div>
                <div class="category-card">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#27ae60" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"></path><path d="M21 8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z"></path><path d="M10 12v10"></path><path d="M14 12v10"></path><path d="m17 22 4-12"></path><path d="m7 22-4-12"></path><path d="M3 22h18"></path></svg>

                </div>
                <div class="category-card">

                    <p>Sweet Shop</p>
                </div>
                <div class="category-card">
                    <a href="food&rest.html" class="card-link">

                            <path d="M2 18h20a1 1 0 0 1 1 1v1a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1v-1a1 1 0 0 1 1-1Z"></path>
                            <path d="M12 4V2"></path>
                            <path d="M3 17a9 9 0 0 1 18 0"></path>
                        </svg>
                        <p>Food & Restaurant</p>
                    </a>
                </div>
                <div class="category-card">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#34495e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                    <p>Repair & Services</p>
                </div>
                <div class="category-card">
                    <div class="dual-icon">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="#f1c40f"><path d="M9 18h6a6 6 0 1 0-6 0Z"></path><path d="M12 22v-4"></path></svg>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="#7f8c8d"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                    </div>
                    <p>Electrician / Plumber</p>
                </div>
                <div class="category-card">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2ecc71" stroke-width="2"><path d="M5 10V4a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-3"></path><path d="M5 10h10" stroke="#ff7675"></path><circle cx="18" cy="15" r="3" fill="#ff7675" stroke="none"></circle></svg>

                </div>
                <div class="category-card">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="#34495e"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-1.1 0-2.1.9-2.1 2L2 13v3c0 .6.4 1 1 1h2"></path><circle cx="7" cy="17" r="2"></circle><circle cx="17" cy="17" r="2"></circle><path d="M14 6l2 2-4 4" fill="none" stroke="#7f8c8d" stroke-width="2"></path></svg>

        <section class="vendors-section">
            <h2 class="section-title">Nearby Vendors</h2>
            <div class="vendor-grid" id="vendor-grid"></div>
        </section>

    <footer class="footer">
        <nav class="footer-links">
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Help</a>
            <a href="#">Terms</a>

    <script src="base.js"></script>
    <script src="script.js"></script>

</html>
