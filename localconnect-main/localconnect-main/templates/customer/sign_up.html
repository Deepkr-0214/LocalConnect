<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Sign Up | LocalConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/customer/customer_sign_up.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="signup-container">
        <div class="signup-card">
            <header class="card-header">
                <h1>Join <span class="brand-gradient">LocalConnect</span></h1>
                <p class="subtitle">Sign up as a Customer</p>
            </header>

            <div class="card-icon">
                <i data-lucide="user-check"></i>
            </div>

            <form class="signup-form" method="POST" action="/customer/signup">
                <div class="input-group">
                    <input type="text" name="full_name" placeholder="Full Name" required>
                </div>

                <div class="input-group">
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <input type="tel" name="phone" placeholder="Phone Number" required>
                </div>

                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>

                <div class="input-group">
                    <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                </div>

                <button type="submit" class="btn-submit">
                    Create Customer Account <i data-lucide="arrow-right"></i>
                </button>
            </form>

            <footer class="card-footer">
                <p>Join 10k+ locals supporting their neighborhood.</p>
                <p>Already have an account? <a href="/signin">Sign In</a></p>
            </footer>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
