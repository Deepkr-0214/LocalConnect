<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Sign Up | LocalConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/vendor/vendor_sign_up.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="signup-container">
        <div class="signup-card">
            <header class="card-header">
                <h1>Join <span class="brand-gradient">LocalConnect</span></h1>
                <p class="subtitle">Sign up as a Vendor</p>
            </header>

            <div class="card-icon">
                <i data-lucide="store"></i>
            </div>

            <form class="signup-form" method="POST" action="/vendor/signup">
                <div class="input-group">
                    <input type="text" name="business_name" placeholder="Business Name" required>
                </div>

                <div class="input-group select-wrapper">
                    <select id="businessCategory" name="business_category" required>
                        <option value="" disabled selected>Business Category</option>
                        <option value="food">Food & Restaurant</option>
                        <option value="medicine">Medicine</option>
                        <option value="groceries">Groceries</option>
                        <option value="other">Other</option>
                    </select>
                    <i data-lucide="chevron-down" class="select-arrow"></i>
                </div>

                <div class="input-group">
                    <input type="text" name="business_address" placeholder="Business Address" required>
                </div>

                <div class="input-group">
                    <input type="tel" name="phone" placeholder="Phone Number" required>
                </div>

                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>

                <button type="submit" class="btn-submit">
                    Launch Your Shop <i data-lucide="arrow-right"></i>
                </button>
            </form>

            <footer class="card-footer">
                <div class="trust-badge">
                    <i data-lucide="badge-check"></i>
                </div>
                <p>Already have an account? <a href="/signin">Sign In</a></p>
            </footer>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
