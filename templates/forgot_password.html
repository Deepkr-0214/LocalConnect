<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | LocalConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/sign_in.css">
</head>
<body>
    <div class="bg-grid"></div>
    
    <div class="signin-container">
        <div class="signin-card">
            <header class="card-header">
                <h1>Reset <span class="brand-gradient">Password</span></h1>
                <p class="subtitle">Enter your email to receive reset instructions</p>
            </header>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'success' if category == 'success' else 'error' }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form class="signin-form" method="POST" action="{{ url_for('forgot_password') }}">
                <div class="input-group">
                    <label class="input-label">* Email Address</label>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="button-row">
                    <button type="submit" class="btn-login">Send Reset Link</button>
                </div>
            </form>

            <footer class="card-footer">
                <p>Remember your password? <a href="/signin">Sign In</a></p>
            </footer>
        </div>
    </div>
</body>
</html>
